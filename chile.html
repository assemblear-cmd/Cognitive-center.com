        // --- DOM ELEMENTS ---

        // --- FUNCTIONS ---

        /**
         * Populates the filter dropdowns with unique values from the data.
         */
        function populateFilters() {
            const origins = new Set();
            const specializations = new Set();
            const financingTypes = new Set();

            fundsData.forEach(fund => {
                origins.add(fund['Origin/Type']);
                
                // Split specialization strings and add unique values
                fund['Specialization'].split(',').forEach(spec => specializations.add(spec.trim()));

                // Split financing type strings and add unique values
                fund['Financing Type'].split(',').forEach(type => financingTypes.add(type.trim()));
            });

            // Populate Origin Filter
            Array.from(origins).sort().forEach(origin => {
                const option = document.createElement('option');
                option.value = origin;
                option.textContent = origin;
                originFilter.appendChild(option);
            });

            // Populate Specialization Filter
            Array.from(specializations).sort().forEach(spec => {
                const option = document.createElement('option');
                option.value = spec;
                option.textContent = spec;
                specializationFilter.appendChild(option);
            });
            
            // Populate Financing Type Filter
            Array.from(financingTypes).sort().forEach(type => {

                option.value = type;
                option.textContent = type;
                financingFilter.appendChild(option);
            });
        }

        /**
         * Renders the fund data into cards on the page.
         * @param {Array} data - The array of fund objects to render.
         */
        function renderData(data) {
            container.innerHTML = ''; // Clear existing cards
            if (data.length === 0) {
                noResultsDiv.classList.remove('hidden');
            } else {
                noResultsDiv.classList.add('hidden');
            }

            data.forEach(fund => {
                const card = document.createElement('div');
                card.className = 'card bg-white p-6 rounded-lg shadow-md border border-gray-200 flex flex-col';
                
                card.innerHTML = `

                `;
                container.appendChild(card);
            });
        }

        /**
         * Filters the data based on current search and filter values, then re-renders the cards.
         */
        function filterData() {
            const searchTerm = searchInput.value.toLowerCase();
            const selectedOrigin = originFilter.value;
            const selectedSpecialization = specializationFilter.value;
            const selectedFinancing = financingFilter.value;

            const filteredData = fundsData.filter(fund => {
                const nameMatch = fund['Fund Name'].toLowerCase().includes(searchTerm);
                const featureMatch = fund['Key Features'].toLowerCase().includes(searchTerm);
                const projectMatch = fund['Example Projects'].toLowerCase().includes(searchTerm);
                const originMatch = !selectedOrigin || fund['Origin/Type'] === selectedOrigin;
                const specializationMatch = !selectedSpecialization || fund['Specialization'].includes(selectedSpecialization);
                const financingMatch = !selectedFinancing || fund['Financing Type'].includes(selectedFinancing);
                
                return (nameMatch || featureMatch || projectMatch) && originMatch && specializationMatch && financingMatch;
            });

            renderData(filteredData);
        }
